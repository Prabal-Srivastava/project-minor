# Nginx configuration for News Application
# This should be placed in /etc/nginx/sites-available/ or /etc/nginx/conf.d/

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name news-prop.ddns.net;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name news-prop.ddns.net prop-news.ddns.net;

    # SSL Configuration (update paths to your actual certificate files)
    ssl_certificate /etc/letsencrypt/live/news-prop.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/news-prop.ddns.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Max upload size (for news images)
    client_max_body_size 10M;

    # Logging
    access_log /var/log/nginx/news-app-access.log;
    error_log /var/log/nginx/news-app-error.log;

    # Root directory for frontend static files
    root /var/www/news-app/frontend/dist;
    index index.html;

    # API Backend Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        
        # Important: Don't rewrite the path - pass it as-is
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable buffering for real-time responses
        proxy_buffering off;
    }

    # Serve uploaded files (backend uploads directory)
    location /uploads/ {
        alias /var/www/news-app/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend static assets (with caching)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service Worker
    location /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Manifest and other PWA files
    location ~ \.(json|webmanifest)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Frontend SPA routing - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
